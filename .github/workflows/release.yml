name: Release

# T-008: publica instaladores Windows + macOS al GitHub Release cuando se
# pushea un tag v*. Workflow independiente de ci.yml: no modifica ni
# reemplaza sus triggers ni jobs (corren por separado).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Write APP_VERSION into src/version.py
        shell: bash
        run: |
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"${{ steps.ver.outputs.version }}\"/" src/version.py

      - name: Build .exe (PyInstaller)
        run: pyinstaller build/network_monitor.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build\installer.iss /DAppVersion=${{ steps.ver.outputs.version }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: trafficMe-windows-exe
          path: build/Output/trafficMe-Setup-*-x64.exe
          if-no-files-found: error

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Write APP_VERSION into src/version.py
        run: |
          sed -i '' "s/^APP_VERSION = .*/APP_VERSION = \"${{ steps.ver.outputs.version }}\"/" src/version.py

      - name: Generate macOS icon (.icns)
        run: python3 build/make_icon_macos.py

      - name: Build .app bundle (PyInstaller)
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: pyinstaller build/network_monitor_macos.spec --noconfirm

      - name: Build .dmg
        env:
          DMG_VERSION: ${{ steps.ver.outputs.version }}
        run: build/make_dmg.sh ${{ matrix.arch }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: trafficMe-macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  publish:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: trafficMe-windows-exe
          path: release-assets

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: trafficMe-macos-x86_64
          path: release-assets

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: trafficMe-macos-arm64
          path: release-assets

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
