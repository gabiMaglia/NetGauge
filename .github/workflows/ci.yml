name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  # T-004: build/test/package macOS en ambas arquitecturas. No reemplaza ni
  # modifica el job Windows de arriba (mismo trigger, jobs corren en paralelo).
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Generate macOS icon (.icns)
        run: python3 build/make_icon_macos.py

      - name: Build .app bundle (PyInstaller)
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: pyinstaller build/network_monitor_macos.spec --noconfirm

      - name: Build .dmg
        run: build/make_dmg.sh ${{ matrix.arch }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetGauge-macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error
